<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting — Niharika Jain</title>
<script>
  const parts = window.location.pathname.split('/').filter(Boolean);
  const repoBase = parts.length ? '/' + parts[0] + '/' : '/';
  if (window.location.pathname.endsWith('/assets/Niharika-Jain-Resume.pdf')) {
    window.location.replace(repoBase + 'resume.html');
  } else {
    window.location.replace(repoBase);
  }
</script>
</head>
<body>
  <p>Redirecting… <a href="resume.html">Go to resume</a></p>
</body>
</html>
